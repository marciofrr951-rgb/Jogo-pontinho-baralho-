<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pontinho Pro - Mesa Real</title>
    <style>
        :root {
            --cor-mesa: radial-gradient(circle, #3b50df 0%, #1a2a85 70%, #0a1145 100%);
            --borda-mesa: #222;
            --cor-ouro: #f1c40f;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #111; color: white; 
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* Container Principal - A Sala */
        .sala {
            display: flex; flex-direction: column; height: 100vh;
            background: #000; align-items: center; justify-content: center;
        }

        /* Placar Topo */
        .placares {
            position: absolute; top: 10px; width: 90%;
            display: flex; justify-content: space-between; z-index: 10;
        }
        .placar-box {
            padding: 5px 15px; border-radius: 5px; font-weight: bold; font-size: 14px;
            display: flex; gap: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .verde { background: #1b5e20; border: 1px solid #4caf50; }
        .vermelho { background: #b71c1c; border: 1px solid #f44336; }

        /* A MESA OVAL */
        .mesa-oval {
            position: relative;
            width: 95vw; height: 75vh;
            background: var(--cor-mesa);
            border: 12px solid var(--borda-mesa);
            border-radius: 50% / 50%;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 20px 50px rgba(0,0,0,0.9);
            display: flex; align-items: center; justify-content: center;
        }

        /* Posicionamento dos Jogadores */
        .player-area {
            position: absolute; display: flex; flex-direction: column; align-items: center;
            width: 150px;
        }
        .topo { top: -40px; }
        .esquerda { left: 10px; top: 45%; transform: translateY(-50%); }
        .direita { right: 10px; top: 45%; transform: translateY(-50%); }
        .baixo { bottom: -20px; }

        /* Avatar e Nome */
        .avatar {
            width: 60px; height: 60px; border-radius: 50%;
            background: #444; border: 3px solid var(--cor-ouro);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; font-size: 30px;
        }
        .nome { background: rgba(0,0,0,0.7); padding: 2px 10px; border-radius: 10px; font-size: 12px; margin-top: 5px; }

        /* Área de Jogos Baixados (A Mesa) */
        .jogos-baixados-container {
            position: absolute; width: 60%; height: 50%;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            gap: 20px; pointer-events: none;
        }
        .slot-jogos { 
            display: flex; flex-wrap: wrap; gap: 5px; align-content: flex-start;
            padding: 10px; border-radius: 10px; background: rgba(0,0,0,0.1);
        }

        /* Cartas Pequenas na Mesa */
        .mini-carta {
            width: 25px; height: 38px; background: white; color: black;
            border-radius: 3px; font-size: 10px; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3); border: 0.5px solid #999;
        }
        .vermelha { color: #d32f2f; }

        /* Sua Mão (RafaelEd...) */
        .minha-mao-area {
            position: fixed; bottom: 10px; width: 100%;
            display: flex; justify-content: center; gap: 5px; z-index: 20;
        }
        .carta-mao {
            width: 55px; height: 85px; background: white; color: black;
            border-radius: 5px; border: 1px solid #000; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 -5px 10px rgba(0,0,0,0.3); transition: transform 0.2s;
        }
        .carta-mao:hover { transform: translateY(-20px); cursor: pointer; }

        /* Centro da Mesa (Monte e Lixo) */
        .centro {
            display: flex; gap: 20px; align-items: center;
        }
        .deck {
            width: 50px; height: 75px; background: #2980b9; border: 2px solid white;
            border-radius: 5px; display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }

    </style>
</head>
<body>

<div class="sala">
    <div class="placares">
        <div class="placar-box verde"><span>Verde</span> <span>530</span></div>
        <div class="placar-box vermelho"><span>Vermelho</span> <span>-30</span></div>
    </div>

    <div class="mesa-oval">
        <div class="player-area topo">
            <div class="avatar">👴</div>
            <div class="nome">Osvaldo...</div>
        </div>

        <div class="player-area esquerda">
            <div class="avatar">👩</div>
            <div class="nome">Gerasam...</div>
        </div>

        <div class="player-area direita">
            <div class="avatar">👤</div>
            <div class="nome">Cavn</div>
        </div>

        <div class="centro">
            <div class="deck">18</div>
            <div class="mini-carta" style="width: 50px; height: 75px; transform: rotate(5deg);">
                <div style="font-size: 18px;">4</div><div style="font-size: 18px;">♦</div>
            </div>
        </div>

        <div class="jogos-baixados-container">
            <div class="slot-jogos" style="justify-content: center; grid-column: 1 / span 2;">
                <div style="display: flex; gap: 2px;">
                    <div class="mini-carta">3<span>♦</span></div>
                    <div class="mini-carta">4<span>♦</span></div>
                    <div class="mini-carta">5<span>♦</span></div>
                </div>
                <div style="display: flex; gap: 2px;">
                    <div class="mini-carta">K<span>♠</span></div>
                    <div class="mini-carta">K<span>♥</span></div>
                    <div class="mini-carta">K<span>♣</span></div>
                </div>
            </div>
            
            <div class="slot-jogos" style="justify-content: flex-start;">
                <div style="display: flex; gap: 2px; flex-direction: column;">
                    <div class="mini-carta">10<span>♣</span></div>
                    <div class="mini-carta">J<span>♣</span></div>
                    <div class="mini-carta">Q<span>♣</span></div>
                </div>
            </div>

            <div class="slot-jogos" style="justify-content: flex-end;">
                 <div class="mini-carta">A<span>♥</span></div>
                 <div class="mini-carta">A<span>♦</span></div>
                 <div class="mini-carta">A<span>♠</span></div>
            </div>
        </div>

        <div class="player-area baixo">
            <div class="avatar" style="border-color: #4caf50;">🧔</div>
            <div class="nome">RafaelEd...</div>
        </div>
    </div>

    <div class="minha-mao-area">
        <div class="carta-mao">10<span>♣</span></div>
        <div class="carta-mao vermelha">J<span>♦</span></div>
        <div class="carta-mao">Q<span>♠</span></div>
        <div class="carta-mao vermelha">K<span>♥</span></div>
        <div class="carta-mao">A<span>♣</span></div>
        <div class="carta-mao">2<span>♠</span></div>
        <div class="carta-mao vermelha">5<span>♦</span></div>
        <div class="carta-mao">8<span>♣</span></div>
        <div class="carta-mao">9<span>♠</span></div>
    </div>
</div>

</body>
</html>
