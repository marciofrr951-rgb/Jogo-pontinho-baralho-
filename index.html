<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pontinho Pro - Mesa Cassino Vertical</title>
    <style>
        :root {
            --feltro: #0b4d2c;
            --ouro: #f1c40f;
            /* Naipes Modernos e Coloridos */
            --copas: #e74c3c; --ouros: #3498db; --paus: #2ecc71; --espadas: #000;
        }

        body, html { margin: 0; padding: 0; height: 100vh; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        .sala { display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: center; position: relative; }

        /* Placar Dinâmico no Topo */
        .header-ui { position: absolute; top: 10px; width: 90%; display: flex; justify-content: space-between; z-index: 100; }
        .msg-turno { font-weight: bold; font-style: italic; color: #aaa; font-size: 14px; }
        .placar-mao { background: white; color: black; padding: 5px 15px; border-radius: 5px; font-weight: bold; border: 2px solid var(--ouro); }

        /* A MESA OVAL (Layout Vertical com Perspectiva) */
        .mesa-oval {
            position: relative;
            width: 95vw; height: 70vh;
            background: var(--feltro);
            border: 10px solid #222;
            border-radius: 50% / 50%;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
        }

        /* Áreas Individuais de Jogadores (Bot e Você) */
        .player-block {
            position: absolute; display: flex; flex-direction: column; align-items: center; width: 120px;
        }
        .pos-topo { top: -35px; }
        .pos-esq { left: 10px; top: 40%; }
        .pos-dir { right: 10px; top: 40%; }
        .pos-baixo { bottom: -15px; border-color: #2ecc71; }

        /* Espaço para Jogos Baixados (O "Tapete") */
        .jogos-tapete {
            width: 100px; height: 80px; background: rgba(0,0,0,0.1); border-radius: 10px;
            border: 1px dashed rgba(255,255,255,0.2); margin-top: 5px;
            display: flex; flex-wrap: wrap; gap: 2px; padding: 5px; align-content: center; justify-content: center;
        }

        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--ouro); background: #333; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .nome { background: rgba(0,0,0,0.7); padding: 1px 8px; border-radius: 10px; font-size: 11px; margin-top: 3px; color: #ccc; }

        /* Centro da Mesa: Monte, Lixo e Vira */
        .centro-mesa { display: flex; align-items: center; gap: 25px; z-index: 50; }
        
        .deck-area { position: relative; width: 55px; height: 80px; cursor: pointer; }
        .vira-coringa {
            position: absolute; bottom: -8px; right: -12px;
            width: 25px; height: 38px; background: white; color: black; border: 1px solid #000;
            font-size: 9px; font-weight: bold; border-radius: 3px; transform: rotate(12deg); z-index: 1;
        }
        .monte-card {
            position: relative; z-index: 2; width: 100%; height: 100%;
            background: #2980b9; border: 2px solid white; border-radius: 5px;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }

        .lixo-slot {
            width: 55px; height: 80px; border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 5px; display: flex; align-items: center; justify-content: center; cursor: pointer;
            color: #aaa; font-weight: bold;
        }

        /* Cartas */
        .carta { background: white; border-radius: 4px; border: 1px solid #000; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; box-shadow: 1px 1px 3px rgba(0,0,0,0.4); }
        .mini { width: 20px; height: 30px; font-size: 9px; }
        
        /* Sua Mão Real - Fica fixada na base */
        .mao-cartas { position: fixed; bottom: 0; width: 100%; height: 95px; background: rgba(255,255,255,0.9); display: flex; justify-content: center; gap: 3px; padding-top: 10px; z-index: 200; box-shadow: 0 -5px 15px rgba(0,0,0,0.4); }
        .carta-mao { width: 42px; height: 65px; cursor: pointer; font-size: 16px; transition: transform 0.2s; }
        .selecionada { transform: translateY(-30px); border: 3px solid var(--ouro); box-shadow: 0 0 10px var(--ouro); }

        /* Cores Naipes */
        .n-♥ { color: var(--copas); } .n-♦ { color: var(--ouros); } .n-♣ { color: var(--paus); } .n-♠ { color: #000; }
    </style>
</head>
